services:
  frontend:
    build: ./frontend
    container_name: space-missions-frontend
    ports:
      - "8080:80"
    environment:
      - VITE_API_URL=http://localhost:3001
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: space-missions-api
    ports:
      - "3001:3000"
    environment:
      - DATABASE_PATH=/app/data/missions.db
      - N8N_WEBHOOK_URL=http://n8n:5678/webhook/mission-launched
    volumes:
      - ./app:/app/app
      - ./data:/app/data
    depends_on:
      - n8n

  n8n:
    image: n8nio/n8n:latest
    container_name: space-missions-n8n
    entrypoint: /bin/sh
    command:
      - -c
      - |
        n8n import:workflow --input=/workflows/mission-launched-workflow.json
        n8n publish:workflow --id=cREDD9WxhjnK7aYn
        n8n start
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - N8N_SECURE_COOKIE=false
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=false
    volumes:
      - ./n8n:/workflows:ro
      - ./n8n-data:/home/node/.n8n
