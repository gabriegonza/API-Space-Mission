services:
  frontend:
    build: ./frontend
    container_name: space-missions-frontend
    ports:
      - "8080:80"
    environment:
      - VITE_API_URL=http://localhost:3001
      - VITE_N8N_URL=http://localhost:5678
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: space-missions-api
    ports:
      - "3001:3000"
    environment:
      - DATABASE_PATH=/app/data/missions.db
      - N8N_WEBHOOK_URL=http://n8n:5678/webhook/mission-launched
      - EVENTS_API_TOKEN=dev-events-token
    volumes:
      - ./app:/app/app
      - ./data:/app/data
    depends_on:
      - n8n

  n8n:
    image: n8nio/n8n:2.28.5
    container_name: space-missions-n8n
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -e
        n8n import:workflow --input=/workflows/mission-launched-workflow.json
        n8n publish:workflow --id=cREDD9WxhjnK7aYn
        n8n start
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - BACKEND_EVENTS_URL=http://api:3000/events
      - EVENTS_API_TOKEN=dev-events-token
      - N8N_SECURE_COOKIE=false
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=false
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
    volumes:
      - ./n8n:/workflows:ro
      - ./n8n-data:/home/node/.n8n
